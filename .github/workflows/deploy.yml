name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.22.0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup pnpm cache
        uses: actions/setup-node@v4
        with:
          node-version: 22.22.0
          cache: pnpm

      - name: Enable Corepack + pnpm
        run: |
          corepack enable
          pnpm -v

      - name: Show runtime versions
        run: node -v && pnpm -v

      - name: Install dependencies (deterministic)
        run: pnpm install --frozen-lockfile

      - name: Validate Cloudflare secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || (echo "CF_API_TOKEN is empty" && exit 1)
          test -n "$CLOUDFLARE_ACCOUNT_ID" || (echo "CF_ACCOUNT_ID is empty" && exit 1)

      - name: Preflight DB schema check (prod)
        if: github.ref == 'refs/heads/main'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          npx wrangler d1 execute 1acc05d4-49bb-4306-8115-5646a945dc9c --remote --command "PRAGMA table_info(users);" > /tmp/users_columns.txt
          grep -q "disabled" /tmp/users_columns.txt || (echo "users.disabled column missing on prod DB" && cat /tmp/users_columns.txt && exit 1)

      - name: Preflight DB schema check (dev)
        if: github.ref == 'refs/heads/dev'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          npx wrangler d1 execute komorebi-dev-db --remote --command "PRAGMA table_info(users);" > /tmp/users_columns_dev.txt
          grep -q "disabled" /tmp/users_columns_dev.txt || (echo "users.disabled column missing on dev DB" && cat /tmp/users_columns_dev.txt && exit 1)

      - name: Deploy main (production)
        if: github.ref == 'refs/heads/main'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: npx -y @opennextjs/cloudflare@1.16.5 build && npx -y @opennextjs/cloudflare@1.16.5 deploy

      - name: Smoke test (production)
        if: github.ref == 'refs/heads/main'
        run: |
          set -e
          curl -fsS https://sinon.live/ >/dev/null
          curl -fsS https://sinon.live/login >/dev/null
          curl -fsSI https://sinon.live/api/auth/signin/google | head -n 1 | grep -qE "HTTP/[0-9.]+ (200|302)"

      - name: Deploy dev (staging)
        if: github.ref == 'refs/heads/dev'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: npx -y @opennextjs/cloudflare@1.16.5 build && npx -y @opennextjs/cloudflare@1.16.5 deploy --env dev

      - name: Smoke test (dev)
        if: github.ref == 'refs/heads/dev'
        run: |
          set -e
          curl -fsS https://dev.sinon.live/ >/dev/null
          curl -fsS https://dev.sinon.live/login >/dev/null
          curl -fsSI https://dev.sinon.live/api/auth/signin/google | head -n 1 | grep -qE "HTTP/[0-9.]+ (200|302)"
