name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.22.0
          cache: npm

      - name: Pin npm version (stability)
        run: npm i -g npm@10.8.2

      - name: Show runtime versions
        run: node -v && npm -v

      - name: Install dependencies (with fallback)
        run: |
          npm config set fetch-retries 5
          npm config set fetch-retry-factor 2
          npm config set fetch-retry-maxtimeout 120000
          npm config set progress false
          npm install --no-audit --no-fund || npm install --no-audit --no-fund --omit=optional

      - name: Deploy main (production)
        if: github.ref == 'refs/heads/main'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.PROD_CF_API_TOKEN || secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.PROD_CF_ACCOUNT_ID || secrets.CF_ACCOUNT_ID }}
        run: npx -y @opennextjs/cloudflare@1.16.5 build && npx -y @opennextjs/cloudflare@1.16.5 deploy

      - name: Deploy dev (staging)
        if: github.ref == 'refs/heads/dev'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.DEV_CF_API_TOKEN || secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.DEV_CF_ACCOUNT_ID || secrets.CF_ACCOUNT_ID }}
        run: npx -y @opennextjs/cloudflare@1.16.5 build && npx -y @opennextjs/cloudflare@1.16.5 deploy --env dev
