apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: modern-blog
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: modern-blog
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      nodeSelector:
        kubernetes.io/hostname: vm-4-17-ubuntu
      containers:
        - name: postgres
          image: postgres:16
          env:
            - name: POSTGRES_DB
              value: modern_blog
            - name: POSTGRES_USER
              value: blog
            - name: POSTGRES_PASSWORD
              value: change-me
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: modern-blog
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
