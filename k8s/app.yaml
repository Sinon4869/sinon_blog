apiVersion: apps/v1
kind: Deployment
metadata:
  name: modern-blog
  namespace: modern-blog
spec:
  replicas: 1
  selector:
    matchLabels:
      app: modern-blog
  template:
    metadata:
      labels:
        app: modern-blog
    spec:
      nodeSelector:
        kubernetes.io/hostname: vm-4-17-ubuntu
      containers:
        - name: modern-blog
          image: modern-blog:prod
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: modern-blog-config
            - secretRef:
                name: modern-blog-secret
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 40
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: modern-blog
  namespace: modern-blog
spec:
  selector:
    app: modern-blog
  ports:
    - port: 80
      targetPort: 3000
